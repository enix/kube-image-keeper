min_version: 1.7.0
skip_lfs: true

pre-commit:
  piped: true
  jobs:
    - name: generate manifests and code
      run: make manifests generate
      glob: "{api/**/*.go,internal/webhook/**/*.go,internal/controller/**/*.go,PROJECT}"
      stage_fixed: true
    - name: lint and fix
      run: make lint-fix
      glob: "**/*.go"
      stage_fixed: true
    - name: markdownlint
      run: npx --yes markdownlint-cli2 --fix -- {staged_files}
      glob: "**/*.md"
      stage_fixed: true
      # markdownlint-cli2 requires Node.js >= 20. Skip when Node is
      # missing or older — keeps the hook optional for contributors
      # who only touch Go code and don't have a Node toolchain.
      skip:
        - run: |
            ! command -v node || 
            [ $(node -v | cut -d'.' -f1 | tr -d 'v') -lt 20 ]

pre-push:
  jobs:
    - name: smoke tests
      run: make test-short

commit-msg:
  jobs:
    - name: lint commit message
      run: COMMIT_MSG_FILE={1} make conform
