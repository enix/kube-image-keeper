apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "kube-image-keeper.fullname" . }}-serving-cert
  name: {{ include "kube-image-keeper.fullname" . }}-mutating-webhook
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "kube-image-keeper.fullname" . }}-webhook
      namespace: {{ .Release.Namespace }}
      path: /mutate--v1-pod
  failurePolicy: Ignore
  reinvocationPolicy: IfNeeded
  {{- with .Values.webhookConfiguration.namespaceSelector }}
  namespaceSelector: {{- . | toYaml | trim | nindent 4 }}
  {{- end }}
  name: mpod-v1.kb.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  sideEffects: NoneOnDryRun
